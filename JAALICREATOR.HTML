<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mughal Jaali Pattern Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at top left, #e0e7ff, transparent 40%),
                              radial-gradient(circle at bottom right, #ffedd5, transparent 40%);
        }
        canvas {
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }
        canvas:hover {
            transform: scale(1.01);
        }
        .control-panel label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4b5563;
            font-weight: 500;
        }
        .control-panel select, .control-panel input[type="range"], .control-panel input[type="color"] {
            width: 100%;
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid #d1d5db;
            background-color: #ffffff;
            color: #111827;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        .control-panel input[type="color"] {
            padding: 0;
            height: 2.5rem;
        }
        .control-panel input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: #e5e7eb;
            outline: none;
            padding: 0;
        }
        .control-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #334155;
            cursor: pointer;
            border-radius: 50%;
        }
        .control-panel input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #334155;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-6xl bg-white/70 backdrop-blur-xl rounded-2xl shadow-xl p-6 md:p-8 border border-slate-200">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900">Mughal Jaali Pattern Generator</h1>
            <p class="text-slate-600 mt-2 max-w-2xl mx-auto">Inspired by the timeless geometric art of Mughal architecture. Customize and create your own intricate Jaali screen designs.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Canvas for drawing the pattern -->
            <div class="lg:col-span-2 rounded-xl overflow-hidden shadow-inner bg-slate-200">
                <canvas id="jaaliCanvas"></canvas>
            </div>

            <!-- Control Panel -->
            <div class="control-panel bg-slate-50/80 p-6 rounded-xl border border-slate-200">
                <h2 class="text-xl font-semibold mb-5 text-slate-800">Customize Your Pattern</h2>
                
                <div class="mb-5">
                    <label for="patternSelect">Pattern Style</label>
                    <select id="patternSelect">
                        <option value="mughalHexStar">Mughal Hexagon & Star</option>
                        <option value="eightPointRosette">Eight-Point Rosette</option>
                        <option value="twelvePointStar">Twelve-Point Star</option>
                        <option value="agraWeave">Agra Weave</option>
                        <option value="hexRosetteGrid">Hexagonal Rosette Grid</option>
                    </select>
                </div>
                
                <div class="mb-5">
                    <label for="voidSizeSlider">Void Size (S:V Ratio)</label>
                    <input type="range" id="voidSizeSlider" min="0.2" max="0.95" step="0.01" value="0.75">
                    <span id="voidSizeValue" class="text-sm text-slate-500 block text-center mt-2">0.75</span>
                </div>
                
                <div class="mb-6">
                    <label for="scaleSlider">Scale / Density</label>
                    <input type="range" id="scaleSlider" min="30" max="150" step="1" value="80">
                    <span id="scaleValue" class="text-sm text-slate-500 block text-center mt-2">80</span>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label for="solidColorPicker">Solid Color</label>
                        <input type="color" id="solidColorPicker" value="#475569">
                    </div>
                    <div>
                        <label for="voidColorPicker">Void Color</label>
                        <input type="color" id="voidColorPicker" value="#f1f5f9">
                    </div>
                </div>

                <button id="downloadBtn" class="w-full bg-slate-800 text-white font-bold py-3 px-4 rounded-lg hover:bg-slate-700 transition-all duration-300 transform hover:scale-105">
                    Download as PNG
                </button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('jaaliCanvas');
            const ctx = canvas.getContext('2d');
            
            // UI Controls
            const ui = {
                patternSelect: document.getElementById('patternSelect'),
                voidSizeSlider: document.getElementById('voidSizeSlider'),
                voidSizeValue: document.getElementById('voidSizeValue'),
                scaleSlider: document.getElementById('scaleSlider'),
                scaleValue: document.getElementById('scaleValue'),
                solidColorPicker: document.getElementById('solidColorPicker'),
                voidColorPicker: document.getElementById('voidColorPicker'),
                downloadBtn: document.getElementById('downloadBtn'),
            };

            // State
            const state = {
                pattern: 'mughalHexStar',
                voidSize: 0.75,
                scale: 80,
                solidColor: '#475569',
                voidColor: '#f1f5f9',
            };

            function resizeCanvas() {
                const container = canvas.parentElement;
                const size = container.clientWidth;
                canvas.width = size;
                canvas.height = size;
                draw();
            }
            
            // --- Main Drawing Function ---
            function draw() {
                ctx.fillStyle = state.solidColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = state.voidColor;

                const patternDrawer = patternDrawers[state.pattern];
                if (patternDrawer) {
                    patternDrawer(ctx, canvas.width, canvas.height, state.scale, state.voidSize);
                }
            }

            // --- Pattern Drawing Logic Map ---
            const patternDrawers = {
                mughalHexStar: drawMughalHexStar,
                eightPointRosette: drawEightPointRosette,
                twelvePointStar: drawTwelvePointStar,
                agraWeave: drawAgraWeave,
                hexRosetteGrid: drawHexRosetteGrid,
            };

            function drawPolygon(ctx, x, y, radius, sides) {
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * 2 * Math.PI;
                    ctx.lineTo(x + radius * Math.cos(angle), y + radius * Math.sin(angle));
                }
                ctx.closePath();
                ctx.fill();
            }
            
            // --- Individual Pattern Functions ---

            function drawMughalHexStar(ctx, width, height, scale, voidSize) {
                const r = scale;
                const h = r * Math.sqrt(3);

                for (let j = -1; j * h / 2 < height + h; j++) {
                    for (let i = -1; i * r * 1.5 < width + r; i++) {
                        const x = i * r * 1.5;
                        const y = j * h / 2;
                        if ((i + j) % 2 === 0) {
                             // Draw central hexagon void
                             drawPolygon(ctx, x, y, r / 2 * voidSize, 6);
                             // Draw star point voids (rhombi)
                             for(let k=0; k<6; k++) {
                                const angle = k * Math.PI / 3;
                                const hx = x + r * 0.75 * Math.cos(angle);
                                const hy = y + r * 0.75 * Math.sin(angle);
                                ctx.save();
                                ctx.translate(hx, hy);
                                ctx.rotate(angle + Math.PI / 2);
                                ctx.beginPath();
                                const rhombWidth = r/2 * voidSize;
                                const rhombHeight = r/3 * voidSize;
                                ctx.moveTo(0, -rhombHeight/2);
                                ctx.lineTo(rhombWidth/2, 0);
                                ctx.lineTo(0, rhombHeight/2);
                                ctx.lineTo(-rhombWidth/2, 0);
                                ctx.closePath();
                                ctx.fill();
                                ctx.restore();
                             }
                        }
                    }
                }
            }

            function drawEightPointRosette(ctx, width, height, scale, voidSize) {
                const gridSize = scale * 1.5;
                const dist = gridSize * (1 / (1 + Math.sqrt(2)));
                
                for (let y = -gridSize; y < height + gridSize; y += dist) {
                    for (let x = -gridSize; x < width + gridSize; x += dist) {
                        drawPolygon(ctx, x, y, dist/2 * voidSize, 8);
                    }
                }
            }
            
            function drawTwelvePointStar(ctx, width, height, scale, voidSize) {
                const r = scale * 1.2;
                const h = r * Math.sqrt(3);

                for (let j = -2; j * h < height + h; j++) {
                    for (let i = -2; i * r * 1.5 < width + r * 1.5; i++) {
                         const x = i * r * 1.5;
                         const y = j * h + (i % 2) * h / 2;
                         
                         // Dodecagon void
                         ctx.save();
                         ctx.translate(x,y);
                         ctx.rotate(Math.PI / 12);
                         drawPolygon(ctx, 0, 0, r * 0.6 * voidSize, 12);
                         ctx.restore();

                         // Triangle voids
                         for(let k=0; k<6; k++) {
                             const angle = k * Math.PI / 3 + Math.PI/6;
                             const tx = x + r * 0.86 * Math.cos(angle);
                             const ty = y + r * 0.86 * Math.sin(angle);
                             ctx.save();
                             ctx.translate(tx,ty);
                             ctx.rotate(angle - Math.PI/2);
                             drawPolygon(ctx, 0, 0, r*0.2 * voidSize, 3);
                             ctx.restore();
                         }
                    }
                }
            }

            function drawAgraWeave(ctx, width, height, scale, voidSize) {
                const gridSize = scale;
                for (let j = -1; j < height / gridSize + 1; j++) {
                    for (let i = -1; i < width / gridSize + 1; i++) {
                        const x = i * gridSize;
                        const y = j * gridSize;
                        const v = gridSize * voidSize;
                        const s = (gridSize - v) / 2;

                        ctx.beginPath();
                        ctx.moveTo(x + s, y + s);
                        ctx.lineTo(x + v + s, y + s);
                        ctx.arc(x + v + s, y + s + v/2, v/2, -Math.PI/2, Math.PI/2);
                        ctx.lineTo(x + s, y + s + v);
                        ctx.arc(x + s, y + s + v/2, v/2, Math.PI/2, -Math.PI/2, true);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            }

            function drawHexRosetteGrid(ctx, width, height, scale, voidSize) {
                const r = scale * 0.6;
                const h = r * Math.sqrt(3);
                
                for (let j = -2; j * h / 2 < height + h; j++) {
                    for (let i = -2; i * r * 1.5 < width + r * 1.5; i++) {
                        const x = i * r * 1.5;
                        const y = j * h / 2;
                        if ((i % 2 === 0 && j % 2 === 0) || (i % 2 !== 0 && j % 2 !== 0)) {
                           drawPolygon(ctx, x, y, r * voidSize, 6);
                        }
                    }
                }
            }


            // --- Event Listeners ---
            function setupEventListeners() {
                ui.patternSelect.addEventListener('change', (e) => {
                    state.pattern = e.target.value;
                    draw();
                });

                ui.voidSizeSlider.addEventListener('input', (e) => {
                    state.voidSize = parseFloat(e.target.value);
                    ui.voidSizeValue.textContent = state.voidSize.toFixed(2);
                    draw();
                });

                ui.scaleSlider.addEventListener('input', (e) => {
                    state.scale = parseInt(e.target.value);
                    ui.scaleValue.textContent = state.scale;
                    draw();
                });

                ui.solidColorPicker.addEventListener('input', (e) => {
                    state.solidColor = e.target.value;
                    draw();
                });

                ui.voidColorPicker.addEventListener('input', (e) => {
                    state.voidColor = e.target.value;
                    draw();
                });

                ui.downloadBtn.addEventListener('click', () => {
                    const link = document.createElement('a');
                    link.download = `jaali_pattern_${state.pattern}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });

                window.addEventListener('resize', resizeCanvas);
            }
            
            // --- Initial Setup ---
            function init() {
                // Set initial values from state to UI
                ui.patternSelect.value = state.pattern;
                ui.voidSizeSlider.value = state.voidSize;
                ui.voidSizeValue.textContent = state.voidSize.toFixed(2);
                ui.scaleSlider.value = state.scale;
                ui.scaleValue.textContent = state.scale;
                ui.solidColorPicker.value = state.solidColor;
                ui.voidColorPicker.value = state.voidColor;

                setupEventListeners();
                resizeCanvas();
            }

            init();
        });
    </script>
</body>
</html>
